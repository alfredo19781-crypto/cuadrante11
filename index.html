<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cuadrante de Turnos Avanzado</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --primary: #1E293B;
      --primary-light: #334155;
      --accent: #3B82F6;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --background: #0F172A;
      --surface: #1E293B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --border: #334155;
      --ap-color: #FBBF24;
      --dark: #0F172A;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--background);
      color: var(--text);
      padding: 10px;
      padding-bottom: 80px;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    /* --- CABECERA --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      background: var(--surface);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .user-info h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .user-info p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: var(--primary-light);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }

    /* --- CONTROLES DE AÑO --- */
    .year-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      padding: 8px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }

    .year-display {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }

    .btn-text {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* --- RESUMEN DE BOLSAS --- */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .summary-card.highlight-purple {
      border-top: 3px solid #8B5CF6;
    }

    .summary-card .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .summary-card .value {
      font-size: 20px;
      font-weight: 800;
      margin-top: 2px;
    }

    .summary-card .sublabel {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 4px;
    }

    /* --- CALENDARIO MENSUAL --- */
    .month-container {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .month-header {
      background: var(--primary-light);
      padding: 10px 14px;
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 6px;
    }

    .day-name {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 4px 0;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 4px 2px;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      border: 1px solid transparent;
    }

    .day-number {
      font-size: 13px;
      font-weight: 700;
    }

    .day-cell.prev-next {
      opacity: 0.15;
      pointer-events: none;
    }

    .day-cell.weekend {
      background: rgba(255,255,255,0.02);
    }

    /* --- ESTILOS DE TURNOS --- */
    .badge-turno {
      font-size: 9px;
      font-weight: 800;
      padding: 1px 4px;
      border-radius: 4px;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .t-24h { background: #3B82F6; color: white; }
    .t-12h-D { background: #F59E0B; color: white; }
    .t-12h-N { background: #6366F1; color: white; }
    .t-guardia { background: #10B981; color: white; }
    .t-libre { color: var(--text-muted); font-weight: normal; }

    /* --- INDICADORES --- */
    .indicator-container {
      display: flex;
      gap: 2px;
      justify-content: center;
      width: 100%;
      height: 5px;
    }

    .ind-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .ind-vac { background: #3B82F6; }
    .ind-ap { background: var(--ap-color); }
    .ind-exc { background: #10B981; }
    .ind-mov { background: #8B5CF6; }

    .mov-hours-label {
      font-size: 8px;
      font-weight: bold;
      color: #A78BFA;
      margin-top: 1px;
    }

    /* --- MODALES --- */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: #FFFFFF;
      color: #1E293B;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
    }

    .modal-content h2, .modal-content h3 {
      margin-bottom: 14px;
      font-weight: 800;
    }

    .card {
      background: #F1F5F9;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #E2E8F0;
    }

    .card label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #CBD5E1;
      background: white;
      color: #1E293B;
      font-size: 14px;
      outline: none;
    }

    .row-config {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 0;
      border-bottom: 1px solid #E2E8F0;
    }

    .inputs-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    /* --- BOTONES --- */
    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary { background: #2563EB; color: white; width: 100%; margin-top: 4px; }
    .btn-danger { background: #DC2626; color: white; width: 100%; margin-top: 6px; }
    .btn-del { background: #FEF2F2; color: #DC2626; padding: 4px 8px; font-size: 11px; align-self: flex-end; border-radius: 6px;}
    .btn-backup { background: #0284C7; color: white; width: 100%; margin-top: 4px; margin-bottom: 4px;}

    .toggle-btn {
      padding: 6px 10px;
      background: #E2E8F0;
      color: #475569;
      font-size: 11px;
      border-radius: 6px;
    }
    .toggle-btn.active {
      background: #DC2626;
      color: white;
    }

    /* --- MENÚ INFERIOR DE ACCESOS RÁPIDOS --- */
    .bottom-menu {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      justify-content: space-around;
      z-index: 900;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      gap: 4px;
    }

    .menu-item i {
      font-size: 18px;
    }

    .menu-item.active {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const MESES_NOM = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const DIAS_SEM = ["LU", "MA", "MI", "JU", "VI", "SÁ", "DO"];

    // Función matemática para calcular diferencia horaria considerando el salto de medianoche
    function calcularDiferenciaHoras(inicio, fin) {
      if (!inicio || !fin) return 0;
      const [hIni, mIni] = inicio.split(':').map(Number);
      const [hFin, mFin] = fin.split(':').map(Number);
      
      let difMinutos = (hFin * 60 + mFin) - (hIni * 60 + mIni);
      if (difMinutos <= 0) {
        difMinutos += 24 * 60; // Suma un día entero si termina al día siguiente
      }
      return parseFloat((difMinutos / 60).toFixed(2));
    }

    function App() {
      const [year, setYear] = useState(new Date().getFullYear());
      const [showGear, setShowGear] = useState(false);
      const [edit, setEdit] = useState(null);
      const [detallesBolsa, setDetallesBolsa] = useState(null);
      const [mostrarModalImportar, setMostrarModalImportar] = useState(false);
      const [textoAImportar, setTextoAImportar] = useState("");
      const [textoExportado, setTextoExportado] = useState("");
      const [tempTipo12h, setTempTipo12h] = useState("D");
      const [menuActivo, setMenuActivo] = useState("cuadrante");

      // Carga unificada de datos desde LocalStorage
      const [user, setUser] = useState(() => {
        const local = localStorage.getItem("cuadrante_user_v3");
        if (local) {
          try { return JSON.parse(local); } catch(e) { console.error(e); }
        }
        return {
          nombre: "Agente de Guardia",
          ingreso: 2008,
          cuadrante: {}, 
          periodos: [],  
          excesos: [],   
          ap: [],        
          guardias: [],  
          movilizaciones: [],
          mov_arrastradas: {},
          otros: []
        };
      });

      useEffect(() => {
        localStorage.setItem("cuadrante_user_v3", JSON.stringify(user));
      }, [user]);

      // --- COPIAS DE SEGURIDAD ---
      const manejarExportar = () => {
        const str = btoa(unescape(encodeURIComponent(JSON.stringify(user))));
        setTextoExportado(str);
      };

      const manejarImportar = () => {
      try {
      const dec = decodeURIComponent(escape(atob(textoAImportar.trim())));
      const backup = JSON.parse(dec);
      
      // Fusionamos el backup con la estructura necesaria para evitar fallos
      const usuarioFusionado = {
        nombre: backup.nombre || "Usuario",
        ingreso: backup.ingreso || 2024,
        cuadrante: backup.cuadrante || {},
        periodos: backup.periodos || [],
        excesos: backup.excesos || [],
        ap: backup.ap || [],
        guardias: backup.guardias || [],
        movilizaciones: backup.movilizaciones || [],
        mov_arrastradas: backup.mov_arrastradas || {},
        otros: backup.otros || [],
        permisos: backup.permisos || [] // Campo nuevo para evitar errores
      };

      setUser(usuarioFusionado);
      localStorage.setItem('userData', JSON.stringify(usuarioFusionado));
      setMostrarModalImportar(false);
      setTextoAImportar("");
      alert("¡Sincronización realizada con éxito!");
      window.location.reload(); // Vital para que la app se resetee con los nuevos datos
    } catch (e) {
      alert("El código de restauración no es compatible.");
      console.error("Error al restaurar:", e);
    }

      const cambiarAnio = (dir) => setYear(prev => prev + dir);

      // --- GENERADOR DE PATRÓN CÍCLICO ---
      const aplicarPatron = () => {
        const startStr = document.getElementById('rStart').value;
        const endStr = document.getElementById('rEnd').value;
        const cHoras = document.getElementById('cHoras').value;
        const cDW = parseInt(document.getElementById('cDW').value) || 1;
        const cDD = parseInt(document.getElementById('cDD').value) || 4;

        if (!startStr || !endStr) return;
        const dIni = new Date(startStr + 'T00:00:00');
        const dFin = new Date(endStr + 'T00:00:00');
        
        let nuevoCuadrante = { ...user.cuadrante };
        let iter = new Date(dIni);
        let contadorDias = 0;
        let cicloTotal = cDW + cDD;
        let toggle12h = true;

        while(iter <= dFin) {
          const yKey = iter.getFullYear();
          const mKey = iter.getMonth() + 1;
          const dKey = iter.getDate();
          const dK = `${yKey}-${mKey}-${dKey}`;

          let posicion = contadorDias % cicloTotal;
          if (posicion < cDW) {
            if (cHoras === "24") {
              nuevoCuadrante[dK] = { tipo: "24h", descanso: false };
            } else {
              if (tempTipo12h === "D") {
                nuevoCuadrante[dK] = { tipo: "12h-D", descanso: false };
              } else if (tempTipo12h === "N") {
                nuevoCuadrante[dK] = { tipo: "12h-N", descanso: false };
              } else {
                nuevoCuadrante[dK] = { tipo: toggle12h ? "12h-D" : "12h-N", descanso: false };
                if (posicion === cDW - 1) toggle12h = !toggle12h;
              }
            }
          } else {
            nuevoCuadrante[dK] = { tipo: "libre", descanso: true };
          }
          contadorDias++;
          iter.setDate(iter.getDate() + 1);
        }

        setUser({ ...user, cuadrante: nuevoCuadrante });
        alert("Patrón cíclico aplicado con éxito.");
      };

      // --- MANEJO DE CELDAS DEL CUADRANTE ---
      const abrirCeldaRapida = (dK) => {
        const data = user.cuadrante[dK] || { tipo: "ninguno", descanso: false };
        setEdit({ dK, data });
      };

      const guardarCeldaRapida = () => {
        if (!edit) return;
        const val = document.getElementById('modalTipo').value;
        let nuevoCuadrante = { ...user.cuadrante };

        if (val === "ninguno") {
          delete nuevoCuadrante[edit.dK];
        } else if (val === "libre") {
          nuevoCuadrante[edit.dK] = { tipo: "libre", descanso: true };
        } else {
          nuevoCuadrante[edit.dK] = { tipo: val, descanso: false };
        }

        setUser({ ...user, cuadrante: nuevoCuadrante });
        setEdit(null);
      };

      // --- FILTROS DE DISPONIBILIDAD PARA EVITAR DUPLICADOS ---
      const obtenerTurnosDisponibles = (idActual, y, m, d) => {
        if (!m || !d) return ["M", "T", "N"];
        let turnosOcupados = [];
        
        (user.excesos || []).forEach(x => {
          if (x.id !== idActual && x.y === y && x.mes === m && x.dia === d && !x.esProrroga) {
            turnosOcupados.push(x.turno);
          }
        });
        (user.ap || []).forEach(a => {
          if (a.id !== idActual && a.y === y && a.mes === m && a.dia === d && !a.esProrroga) {
            turnosOcupados.push(a.turno);
          }
        });

        return ["M", "T", "N"].filter(t => !turnosOcupados.includes(t));
      };

      // --- RECALCULO DE BOLSAS GLOBALES ---
      const calculosAnuales = () => {
        let diasVacaciones = 0;
        let diasProrrogaVac = 0;
        (user.periodos || []).forEach(p => {
          if (p && p.y === year && p.dIni && p.mIni && p.dFin && p.mFin) {
            const f1 = new Date(year, p.mIni - 1, p.dIni);
            const f2 = new Date(year, p.mFin - 1, p.dFin);
            const diff = Math.floor((f2 - f1) / (1000 * 60 * 60 * 24)) + 1;
            if (diff > 0) {
              if (p.esProrroga) diasProrrogaVac += diff;
              else diasVacaciones += diff;
            }
          }
        });

        let apDisfrutados = 0;
        let apProrroga = 0;
        (user.ap || []).forEach(a => {
          if (a && a.y === year && a.dia && a.mes && a.turno !== "-") {
            if (a.esProrroga) apProrroga++;
            else apDisfrutados++;
          }
        });

        let excDisfrutados = 0;
        let excProrroga = 0;
        (user.excesos || []).forEach(e => {
          if (e && e.y === year && e.dia && e.mes && e.turno !== "-") {
            if (e.esProrroga) excProrroga++;
            else excDisfrutados++;
          }
        });

        let totalMovilizaciones = 0;
        (user.movilizaciones || []).forEach(m => {
          if (m && m.y === year && m.dia && m.mes) {
            totalMovilizaciones += calcularDiferenciaHoras(m.horaInicio, m.horaFin);
          }
        });
        const arrastradas = (user.mov_arrastradas && user.mov_arrastradas[year]) || 0;
        const bolsaMovTotal = totalMovilizaciones + arrastradas;

        const canios = Math.max(0, year - user.ingreso);
        const trienios = Math.floor(canios / 3);

        return {
          diasVacaciones, diasProrrogaVac,
          apDisfrutados, apProrroga,
          excDisfrutados, excProrroga,
          bolsaMovTotal, totalMovilizaciones, arrastradas,
          trienios
        };
      };

      const calc = calculosAnuales();

      // --- CONSTRUCCIÓN DEL CALENDARIO ---
      const renderMes = (mIdx) => {
        const primerDia = new Date(year, mIdx, 1);
        const ultimoDia = new Date(year, mIdx + 1, 0);
        
        let diaInicioSem = primerDia.getDay(); 
        if (diaInicioSem === 0) diaInicioSem = 7; 

        const totalDias = ultimoDia.getDate();
        const celdas = [];

        for (let i = 1; i < diaInicioSem; i++) {
          celdas.push(<div key={`empty-${i}`} className="day-cell prev-next"></div>);
        }

        for (let d = 1; d <= totalDias; d++) {
          const dK = `${year}-${mIdx + 1}-${d}`;
          const currentFecha = new Date(year, mIdx, d);
          const esFinde = currentFecha.getDay() === 0 || currentFecha.getDay() === 6;

          const tInfo = user.cuadrante[dK];
          let turnoBadge = null;
          if (tInfo) {
            if (tInfo.tipo === "24h") turnoBadge = <span className="badge-turno t-24h">24h</span>;
            else if (tInfo.tipo === "12h-D") turnoBadge = <span className="badge-turno t-12h-D">12h-D</span>;
            else if (tInfo.tipo === "12h-N") turnoBadge = <span className="badge-turno t-12h-N">12h-N</span>;
            else if (tInfo.tipo === "G-24h") turnoBadge = <span className="badge-turno t-guardia">🛡️24h</span>;
            else if (tInfo.tipo === "G-12h") turnoBadge = <span className="badge-turno t-guardia">🛡️12h</span>;
            else if (tInfo.tipo === "MOV") turnoBadge = <span className="badge-turno t-24h" style={{background:'#8B5CF6'}}>MOV</span>;
            else if (tInfo.tipo === "libre") turnoBadge = <span className="badge-turno t-libre">L</span>;
          }

          let tieneVac = false;
          (user.periodos || []).forEach(p => {
            if (p && p.y === year && p.dIni && p.mIni && p.dFin && p.mFin) {
              const start = new Date(year, p.mIni - 1, p.dIni);
              const end = new Date(year, p.mFin - 1, p.dFin);
              if (currentFecha >= start && currentFecha <= end) tieneVac = true;
            }
          });

          const tieneAp = (user.ap || []).some(a => a && a.y === year && a.mes === (mIdx + 1) && a.dia === d && a.turno !== "-");
          const tieneExc = (user.excesos || []).some(e => e && e.y === year && e.mes === (mIdx + 1) && e.dia === d && e.turno !== "-");
          
          const movsDelDia = (user.movilizaciones || []).filter(m => m && m.y === year && m.mes === (mIdx + 1) && m.dia === d);
          const tieneMov = movsDelDia.length > 0;

          celdas.push(
            <div key={d} className={`day-cell ${esFinde ? 'weekend' : ''}`} onClick={() => abrirCeldaRapida(dK)}>
              <span className="day-number">{d}</span>
              {turnoBadge}
              
              {tieneMov && movsDelDia.map(m => (
                <div key={m.id} className="mov-hours-label">
                  {m.horaInicio}-{m.horaFin} ({calcularDiferenciaHoras(m.horaInicio, m.horaFin)}h)
                </div>
              ))}

              <div className="indicator-container">
                {tieneVac && <span className="ind-dot ind-vac"></span>}
                {tieneAp && <span className="ind-dot ind-ap"></span>}
                {tieneExc && <span className="ind-dot ind-exc"></span>}
                {tieneMov && <span className="ind-dot ind-mov"></span>}
              </div>
            </div>
          );
        }

        return (
          <div key={mIdx} className="month-container">
            <div className="month-header">
              <span>{MESES_NOM[mIdx]}</span>
              <span style={{fontSize:'12px', color:'var(--text-muted)'}}>{year}</span>
            </div>
            <div className="days-grid">

        ))}
      </div>
      <button className="btn-primary" onClick={() => setDetallesBolsa(null)}>Cerrar</button>
    </div>
  </div>
)}
          {/* --- MODAL RESTAURAR BACKUP --- */}
          {mostrarModalImportar && (
            <div className="modal" onClick={() => setMostrarModalImportar(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h3>Restaurar Copia de Seguridad</h3>
                <textarea rows="6" placeholder="Pega aquí el código cifrado..." value={textoAImportar} onChange={e => setTextoAImportar(e.target.value)} style={{marginTop:'10px', fontFamily:'monospace', fontSize:'11px'}}></textarea>
                <button className="btn-primary" onClick={manejarImportar}>RESTAURAR AHORA</button>
                <button className="btn-danger" style={{background:'#64748B'}} onClick={() => setMostrarModalImportar(false)}>CANCELAR</button>
              </div>
            </div>
          )}

          {/* --- SUBMODAL EXPORTAR BACKUP --- */}
          {textoExportado && (
            <div className="modal" onClick={() => setTextoExportado("")}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h3>Tu Código de Seguridad</h3>
                <p style={{fontSize:'12px', color:'#64748B', margin:'5px 0'}}>Guarda este bloque de texto en tus notas:</p>
                <textarea readOnly rows="6" value={textoExportado} onClick={e => e.target.select()} style={{background:'#F1F5F9', fontFamily:'monospace', fontSize:'11px'}}></textarea>
                <button className="btn-primary" onClick={() => { navigator.clipboard.writeText(textoExportado); alert("¡Copiado al portapapeles!"); }}>COPIAR TEXTO</button>
                <button className="btn-danger" onClick={() => setTextoExportado("")}>CERRAR</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    // Petición automática de pantalla completa al tocar la app
    window.addEventListener("click", function() {
      const doc = window.document;
      const docEl = doc.documentElement;
      const requestFullscreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
      
      if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
        requestFullscreen.call(docEl).catch(err => {
          console.log("Modo pantalla completa bloqueado por el navegador.");
        });
      }
    });
  </script>
</body>
</html>
